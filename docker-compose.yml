services:
  postgres:
    image: postgres:15-alpine
    container_name: taskscheduler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-taskscheduler}
      POSTGRES_USER: ${DB_USERNAME:-taskscheduler}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-taskscheduler} -d ${DB_NAME:-taskscheduler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
    container_name: taskscheduler-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-taskscheduler}
      DB_USERNAME: ${DB_USERNAME:-taskscheduler}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      GMAIL_EMAIL: ${GMAIL_EMAIL:-}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    container_name: taskscheduler-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
